<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skye — Weather</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="container">

    <header class="site-header">
      <span class="logo">skye</span>
      <span class="tagline">weather, simply told</span>
    </header>

    <!-- Search -->
    <section class="search-section">
      <form id="search-form" autocomplete="off">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input
            id="location-input"
            type="text"
            placeholder="Search city, town or landmark…"
            spellcheck="false"
          />
          <button type="submit" class="go-btn">Go</button>
        </div>
      </form>
    </section>

    <!-- State: idle -->
    <div id="state-idle" class="state-idle">
      <p class="idle-hint">Enter any location above to see current weather &amp; forecast.</p>
    </div>

    <!-- State: loading -->
    <div id="state-loading" class="state hidden">
      <div class="loader">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- State: error -->
    <div id="state-error" class="state hidden">
      <div class="error-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
        <p id="error-msg">Something went wrong.</p>
      </div>
    </div>

    <!-- State: result -->
    <div id="state-result" class="state hidden">

      <!-- Current weather -->
      <section class="current-card" id="current-card">
        <div class="current-left">
          <div class="current-location">
            <span id="city-name"></span>
            <span id="country-name"></span>
          </div>
          <div class="current-temp">
            <span id="temp-value"></span>
            <sup class="temp-unit">°C</sup>
          </div>
          <div class="current-feels">
            Feels like <span id="feels-like"></span>°C &nbsp;·&nbsp; <span id="condition-text"></span>
          </div>
          <div class="current-meta">
            <div class="meta-pill">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
              <span id="meta-wind"></span>
            </div>
            <div class="meta-pill">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v6m0 0a4 4 0 1 0 4 4H8a4 4 0 0 0 4-4z"/></svg>
              <span id="meta-humidity"></span>
            </div>
            <div class="meta-pill">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
              <span id="meta-uv"></span>
            </div>
          </div>
        </div>
        <div class="current-right">
          <img id="weather-icon" src="" alt="" />
          <div class="current-hi-lo">
            <span class="hi">↑ <span id="temp-max"></span>°</span>
            <span class="lo">↓ <span id="temp-min"></span>°</span>
          </div>
          <div class="local-time" id="local-time"></div>
        </div>
      </section>

      <!-- Forecast -->
      <section class="forecast-section">
        <h2 class="section-label">7-day forecast</h2>
        <div class="forecast-grid" id="forecast-grid"></div>
      </section>

      <!-- Hourly -->
      <section class="hourly-section">
        <h2 class="section-label">Today, hour by hour</h2>
        <div class="hourly-scroll" id="hourly-scroll"></div>
      </section>

    </div>

  </main>

  <footer class="site-footer">
    Powered by <a href="https://www.weatherapi.com/" target="_blank" rel="noopener">WeatherAPI.com</a>
  </footer>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
